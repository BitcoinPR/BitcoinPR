<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BitcoinPR Explorer</title>
    <meta name="description" content="BitcoinPR Block Explorer and Mining Dashboard">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-inner">
            <a href="#/" class="nav-logo">
                <span class="logo-icon">₿</span>
                <span class="logo-text">BitcoinPR</span>
            </a>
            <form id="search-form" class="search-bar" autocomplete="off">
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search block height, hash, txid, or address…"
                    spellcheck="false"
                    autocomplete="off"
                >
                <button type="submit" id="search-btn" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>
            <div class="nav-links">
                <a href="#/" class="nav-link" data-route="/">Dashboard</a>
                <a href="#/mempool" class="nav-link" data-route="/mempool">Mempool</a>
                <a href="#/mining" class="nav-link" data-route="/mining">Mining</a>
                <a href="#/mining/config" class="nav-link" data-route="/mining/config">Mining Config</a>
                <a href="#/info" class="nav-link" data-route="/info">Info</a>
            </div>
            <button class="nav-hamburger" id="hamburger-btn" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <a href="#/" class="mobile-link" data-route="/">Dashboard</a>
        <a href="#/mempool" class="mobile-link" data-route="/mempool">Mempool</a>
        <a href="#/mining" class="mobile-link" data-route="/mining">Mining</a>
        <a href="#/mining/config" class="mobile-link" data-route="/mining/config">Mining Config</a>
        <a href="#/info" class="mobile-link" data-route="/info">Info</a>
    </div>

    <main id="app">
        <div class="loading-screen">
            <div class="spinner"></div>
            <p>Loading BitcoinPR Explorer…</p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <a class="footer-brand" href="https://github.com/BitcoinPR/BitcoinPR" target="_blank" rel="noopener">Powered by <strong>BitcoinPR</strong></a>
            <span class="footer-version" id="footer-version"></span>
        </div>
    </footer>

    <div id="toast-container"></div>

    <script src="/js/app.js"></script>
    <script src="/js/mining.js"></script>
</body>
</html>
