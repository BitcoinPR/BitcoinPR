# bx.cfg — bitcoin-explorer client config for the regtest interop cluster.
#
# Points bx at the local libbitcoin server's ZMQ query endpoint and sets
# the regtest network identifier so address/key operations use the right
# version bytes.
#
# Mount this file read-only into the container and pass it via -c:
#   docker exec interop-libbitcoin bx fetch-height -c /etc/libbitcoin/bx.cfg

[network]
# Regtest P2P magic (same value as bs.cfg identifier).
identifier = 3669344250

[server]
# Local ZMQ public query endpoint (unauthenticated).
url = tcp://127.0.0.1:9091
# No server public key required (unauthenticated server).
server_public_key = 0000000000000000000000000000000000000000
