# bs.cfg — Libbitcoin Server configuration for regtest interoperability cluster
# Option names taken verbatim from the version3 reference config.

[log]
# Send logs to the container's stdout/stderr so `docker logs` captures them.
# Rotation MUST be disabled (0) — boost::log cannot rotate a character device.
debug_file = /dev/stdout
error_file = /dev/stderr
rotation_size = 0
verbose = true

[network]
# Regtest P2P magic: bytes FA BF B5 DA on the wire = 0xDAB5BFFA = 3669344250 decimal.
identifier = 3669344250
# Listen for inbound P2P on 18445 (avoids clashing with bitcoinpr1's 18444).
inbound_port = 18445
inbound_connections = 8
# No host pool (regtest uses only the manual peer below), so outbound
# discovery connections would always fail with "object does not exist".
outbound_connections = 0
# Disable built-in DNS seed lookup — regtest has no DNS seeds and the
# mainnet seed hosts reject our magic bytes, causing a fatal startup error.
# Setting host_pool_capacity = 0 skips seeding entirely.
host_pool_capacity = 0
# Connect to bitcoinpr1 as our sole peer.
peer = bitcoinpr1:18444

[database]
directory = /data/libbitcoin/chain

[blockchain]
# No mainnet checkpoints — regtest produces its own chain from genesis.
cores = 0

[fork]
# Regtest: allow min-difficulty blocks and disable difficulty retargeting.
easy_blocks = true
retarget = false
bip16 = true
bip30 = true
bip34 = false
bip66 = true
bip65 = true
bip90 = false
bip68 = true
bip112 = true
bip113 = true
bip141 = true
bip143 = true
bip147 = true

[node]
block_latency_seconds = 60
relay_transactions = true
refresh_transactions = true

[server]
# Public (unauthenticated) ZMQ endpoints.
public_query_endpoint       = tcp://*:9091
public_heartbeat_endpoint   = tcp://*:9092
public_block_endpoint       = tcp://*:9093
public_transaction_endpoint = tcp://*:9094
query_workers = 4
heartbeat_service_seconds = 5
block_service_enabled = true
transaction_service_enabled = true
