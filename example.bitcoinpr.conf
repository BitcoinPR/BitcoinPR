# BitcoinPR Configuration File
# Place this file at ~/.bitcoinpr/bitcoinpr.conf (or use --datadir to specify location)
#
# Lines starting with # are comments.
# Format: key=value (no spaces around =)
# CLI arguments take precedence over config file values.

# ─── Network ──────────────────────────────────────────────────────────────────
# Which Bitcoin network to connect to.
# Options: mainnet, testnet, testnet4, regtest, signet
# Default: mainnet
#network=mainnet

# ─── Data Directory ──────────────────────────────────────────────────────────
# Where to store blockchain data (headers, blocks, UTXO set, indexes).
# Supports ~ for home directory expansion.
# Default: ~/.bitcoinpr
#datadir=~/.bitcoinpr

# ─── Blocks Directory ────────────────────────────────────────────────────────
# Store the raw block files (blk*.dat) on a separate, typically larger/slower
# disk (e.g. an HDD) while keeping the performance-critical indexes (headers,
# UTXO set, txindex, scripthash index) under datadir on a fast disk. Mirrors
# Bitcoin Core's -blocksdir. Blocks are placed at <blocksdir>/<network>/blocks.
# To relocate blocks you already have, start once with --migrateblocks on the
# command line (alongside blocksdir): it moves the existing blk*.dat files and
# leaves the indexes in place, then keeps running. Default: <datadir>.
#blocksdir=/mnt/hdd/bitcoinpr

# ─── P2P Networking ──────────────────────────────────────────────────────────
# Port to listen for incoming P2P connections.
# Defaults: mainnet=8333, testnet=18333, testnet4=48333, regtest=18444, signet=38333
#port=8333

# Connect only to specific peers (bypasses DNS seed discovery).
# Can be specified multiple times. Format: host:port or just host (default port used).
# `addnode` is accepted as an alias.
#connect=192.168.1.100:8333
#connect=10.0.0.50

# Serve BIP 37 bloom-filtered connections to inbound peers. Advertises NODE_BLOOM
# (BIP 111) and answers the BIP 35 `mempool` message. Off by default; never enabled
# on outbound connections. Opt-in for explorer / light-client (SPV) use cases.
# Default: off (disabled)
#peerbloomfilters=1

# Disable outbound IPv6 peer connections. Use when the host has no IPv6 route
# (avoids 10s connection timeouts on unreachable IPv6 addresses).
# Default: off (IPv6 enabled)
#disableipv6=1

# ─── Tor / Privacy ───────────────────────────────────────────────────────────
# Route outbound connections through a SOCKS5 proxy (e.g. a local Tor daemon).
# `.onion` hostnames are resolved by the proxy, not locally. Applies to every
# network unless `onion` overrides the onion route.
#proxy=127.0.0.1:9050

# SOCKS5 proxy used specifically for `.onion` connections (overrides `proxy`
# for Tor). Defaults to `proxy` when unset.
#onion=127.0.0.1:9050

# Restrict outbound connections to specific networks: ipv4, ipv6, onion, i2p.
# Repeatable. With a Tor proxy set, `onlynet=onion` makes this a Tor-only node
# (clearnet DNS seeding is skipped; a cold start bootstraps from the built-in
# fixed onion seeds, then from peers.dat / addrv2 gossip).
#onlynet=onion

# Randomize SOCKS5 credentials per connection so Tor isolates each peer onto its
# own circuit. Default: 1 (on).
#proxyrandomize=1

# Create a v3 .onion hidden service via the Tor control port so the node is
# reachable inbound over Tor. Default: 1 (attempted when a control port is
# reachable, silently skipped otherwise). See docs/tor-i2p.md.
#listenonion=1
#torcontrol=127.0.0.1:9051
#torpassword=

# ─── I2P ─────────────────────────────────────────────────────────────────────
# Enable the I2P transport via a SAM bridge (an i2pd / Java I2P router). Unset
# disables I2P. The node's .b32.i2p destination is persisted under the datadir.
#i2psam=127.0.0.1:7656
# Accept inbound I2P connections. Default: 1 when i2psam is set.
#i2pacceptincoming=1

# ─── RPC Server ──────────────────────────────────────────────────────────────
# Bind address for the JSON-RPC server.
# Use 0.0.0.0 to accept connections from any interface (not recommended without auth).
# Default: 127.0.0.1
#rpcbind=127.0.0.1

# Port for the JSON-RPC server.
# Defaults: mainnet=8332, testnet=18332, testnet4=48332, regtest=18443, signet=38332
#rpcport=8332

# RPC authentication credentials.
# IMPORTANT: Change these from the defaults for any non-local deployment.
# Default: bitcoinpr / bitcoinpr
#rpcuser=bitcoinpr
#rpcpassword=bitcoinpr

# ─── Storage / Performance ───────────────────────────────────────────────────
# UTXO database cache size in megabytes. Larger values speed up initial block
# download at the cost of memory.
# Default: 450
#dbcache=450

# ─── Transaction Index ───────────────────────────────────────────────────────
# Maintain a full transaction index. Enables getrawtransaction for all
# confirmed transactions, not just those in the mempool.
# Default: off (disabled)
#txindex=1

# ─── Address Indexing & Electrum ─────────────────────────────────────────────
# Enable scripthash indexing for address lookups, the web explorer, and the
# built-in Electrum protocol server.
# Requires: --features indexing (or --features full) at compile time.
# Default: off (disabled)
#index=1

# Electrum plain-text TCP listen port.
# Default: 50001
#electrumport=50001

# Electrum SSL/TLS listen port.
# Default: electrumport + 1 (50002)
#electrumsslport=50002

# Custom TLS certificate for the Electrum SSL port. Provide BOTH a PEM
# certificate chain and its matching PEM private key. When unset, BitcoinPR
# generates a self-signed certificate at startup.
#electrumcert=/etc/bitcoinpr/electrum-cert.pem
#electrumkey=/etc/bitcoinpr/electrum-key.pem

# MOTD banner returned by the Electrum `server.banner` method.
# Default: BitcoinPR Electrum Server
#electrumbanner=Welcome to my BitcoinPR Electrum server

# ─── Web Explorer ────────────────────────────────────────────────────────────
# Port for the embedded web block explorer (HTTP + WebSocket).
# Requires: --features web (or --features full) at compile time.
# The explorer provides a dashboard, block/tx/address search, mempool
# visualization, and real-time WebSocket notifications.
# Default: 3000
#webport=3000

# ─── Mining Gateway ──────────────────────────────────────────────────────────
# Enable the built-in mining gateway. Supports both Stratum V1 (cgminer,
# bfgminer, cpuminer) and SV2 Template Distribution Protocol. The protocol
# is auto-detected on connection.
# Default: off (disabled)
#mining=1

# Port for the mining gateway (Stratum V1 / SV2).
# Point your miner at stratum+tcp://host:<port> (V1) or connect an SV2
# template receiver to the same port.
# Default: 3333
#miningport=3333

# Coinbase payout address. Mined blocks pay to this address.
# For testnet, use a tb1... bech32 address; for mainnet, use bc1...
# If unset, uses OP_TRUE (anyone-can-spend) — fine for regtest/testing only.
#miningaddress=tb1qyouraddresshere

# Pin the Stratum share difficulty (Bitcoin-style difficulty number),
# disabling per-worker vardiff. Without it, each connection's share
# difficulty ramps automatically toward ~1 share per 15 seconds.
# Never changes block nBits — mined blocks stay consensus-valid.
#miningdifficulty=70000

# Coinbase scriptSig tag appended after the BIP 34 height (≤ 80 bytes).
# Used for pool attribution in block explorers.
# Default: /BitcoinPR/
#coinbasetag=/BitcoinPR/

# Pool attribution name embedded for block-explorer identification.
#poolname=my-pool

# ─── Relay Policy (Knots-style) ──────────────────────────────────────────────
# These are mempool/relay/mining policy only: they control what this node
# accepts into its mempool, relays, and puts in block templates. Blocks mined
# by others containing filtered transactions still validate normally.

# Relay and mine transactions with OP_RETURN data-carrier outputs.
# Set to 0 to reject all OP_RETURN transactions from the mempool.
# Default: 1 (Core and Knots default)
#datacarrier=1

# Maximum size in bytes of OP_RETURN output scripts to relay and mine,
# including the OP_RETURN opcode byte. Core defaults to 83; Knots uses 42.
# Ignored when datacarrier=0.
# Default: 83
#datacarriersize=42

# Relay and mine bare (non-P2SH) multisig outputs. Bare multisig is the
# data-embedding vector used by Stamps/SRC-20; its fake-pubkey outputs are
# unspendable and bloat the UTXO set forever. Set to 1 for Bitcoin Core-
# compatible relay.
# Default: 0 (Knots default)
#permitbaremultisig=0

# Reject parasitic-protocol transactions: inscription envelopes
# (OP_FALSE OP_IF ... OP_ENDIF) in tapscript witnesses. On by default;
# set to 0 to opt out.
# Default: 1 (Knots default)
#rejectparasites=0

# Reject token-protocol transactions: Runes runestones, Omni/Counterparty
# OP_RETURN payloads, and BRC-20 inscriptions. On by default; set to 0 to
# opt out.
# Default: 1 (stricter than Knots, which defaults to 0)
#rejecttokens=0

# ─── Logging ─────────────────────────────────────────────────────────────────
# Log verbosity level.
# Options: trace, debug, info, warn, error
# Default: info
#loglevel=info

# Output structured JSON logs instead of human-readable text (useful for log aggregation).
# Default: off (disabled)
#jsonlog=1
